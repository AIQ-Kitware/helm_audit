schema_version: 1
experiment_name: audit-gpt-oss-20b-vllm-smoke
description: Checked-in reference manifest for the gpt-oss smoke batch. The runnable repro flow uses reproduce/gpt_oss_20b_vllm/05_write_bundle.sh to generate a machine-local LiteLLM-backed manifest.
run_entries:
  - ifeval:model=openai/gpt-oss-20b,model_deployment=litellm/gpt-oss-20b-local
  - bbq:subject=all,method=multiple_choice_joint,max_train_instances=0,model=openai/gpt-oss-20b,model_deployment=litellm/gpt-oss-20b-local
max_eval_instances: 5
suite: audit-gpt-oss-20b-vllm-smoke
mode: compute_if_missing
materialize: symlink
backend: tmux
devices: 0
tmux_workers: 1
local_path: prod_env
precomputed_root: null
require_per_instance_stats: true
model_deployments_fpath: configs/local_models/gpt_oss_20b_vllm/model_deployments.yaml
enable_huggingface_models: []
enable_local_huggingface_models: []
