# Checked-in reference only.
# The runnable deployment bundle for this model family is generated by:
#   reproduce/gpt_oss_20b_vllm/05_write_bundle.sh
# That runtime bundle injects the local LiteLLM endpoint and API key from the
# operator environment rather than freezing machine-specific secrets here.
model_deployments:
  - name: litellm/gpt-oss-20b-local
    model_name: openai/gpt-oss-20b
    tokenizer_name: openai/o200k_harmony
    max_sequence_length: 32768
    client_spec:
      class_name: "helm.clients.openai_client.OpenAILegacyCompletionsClient"
      args:
        base_url: "http://localhost:14000/v1"
        api_key: "SET_LITELLM_MASTER_KEY_IN_RUNTIME_BUNDLE"
        openai_model_name: "openai/gpt-oss-20b"
  - name: litellm/gpt-oss-20b-chat-local
    model_name: openai/gpt-oss-20b
    tokenizer_name: openai/o200k_harmony
    max_sequence_length: 32768
    client_spec:
      class_name: "helm.clients.openai_client.OpenAIClient"
      args:
        base_url: "http://localhost:14000/v1"
        api_key: "SET_LITELLM_MASTER_KEY_IN_RUNTIME_BUNDLE"
        openai_model_name: "openai/gpt-oss-20b"
