[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "helm-audit"
version = "0.0.1"
description = "Python-first HELM audit and reproducibility workflow"
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
  "numpy>=1.26",
  "pandas>=2",
  "scriptconfig>=0.8.2",
  "seaborn>=0.13",
    "crfm-helm>=0.5.8",
    "pandas>=2.2.3",
    "dacite>=1.9.2",
    "ubelt>=1.3.8",
    "lazy_loader>=0.4",
    "scikit-learn>=1.7.1",
    "h5py>=3.14.0",
    "numexpr>=2.11.0",
    "kwarray>=0.7.1",
    "kwutil>=0.3.8", 
    "pygtrie>=2.5.0",
    "scriptconfig>=0.8.4",
    "orjson>=3.10.15",
    "msgspec>=0.19.0",
    "rich>=14.1.0",
    "fsspec>=2024.9.0",
    "pyyaml>=6.0.2",
    "typing-extensions>=4.0.0",
    "ruamel.yaml>=0.17.22",
    "loguru>=0.7.3",
    "plotly>=6.0.0",
    "kaleido>=1.0.0",
]


[project.scripts]
helm-audit-check-env = "helm_audit.cli.check_env:main"
helm-audit-make-manifest = "helm_audit.cli.manifests:main"
helm-audit-run = "helm_audit.cli.run:main"
helm-audit-index = "helm_audit.workflows.index_results:main"
helm-audit-compare-pair = "helm_audit.reports.pair_report:main"
helm-audit-compare-batch = "helm_audit.workflows.compare_batch:main"
helm-audit-report-core = "helm_audit.reports.core_metrics:main"
helm-audit-report-aggregate = "helm_audit.reports.aggregate:main"
helm-audit-rebuild-core = "helm_audit.workflows.rebuild_core_report:main"
helm-audit-analyze-experiment = "helm_audit.workflows.analyze_experiment:main"
helm-audit-analyze-many = "helm_audit.cli.analyze_many:main"
helm-audit-build-summary = "helm_audit.workflows.build_reports_summary:main"
helm-audit-portfolio-status = "helm_audit.cli.portfolio_status:main"

[tool.setuptools.packages.find]
include = ["helm_audit*"]
