[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "helm-reproducibility"
version = "0.0.0"
description = "HELM reproducibility audit workflow and analysis tooling"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
include = ["helm_reproducibility*"]
